name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://watchtower:watchtower@localhost:5432/watchtower
    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: watchtower
          POSTGRES_PASSWORD: watchtower
          POSTGRES_DB: watchtower
        options: >-
          --health-cmd "pg_isready -U watchtower -d watchtower"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Ruff check
        run: ruff check .
      - name: Ruff format
        run: ruff format --check .
      - name: Alembic upgrade
        run: alembic upgrade head
      - name: Pytest
        run: pytest

  web:
    name: Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build

  verify:
    name: Repo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sanity check
        run: |
          test -f README.md
          test -f CONTRIBUTING.md
          test -f api/pyproject.toml
          test -f web/package.json
          echo "OK — repository skeleton present"
